<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Lib — Gallery</title>
    <meta name="description" content="Explore curated Midjourney seeds for AI image generation.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>SEED LIB</h2>
                <p>Curated Midjourney seeds.</p>
            </div>

            <!-- Search Component -->
            <div class="sidebar-search">
                <svg class="sidebar-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="gl-search" placeholder="Search seeds..." autocomplete="off">
            </div>

            <!-- Category Nav -->
            <nav class="sidebar-nav">
                <ul class="category-list" id="category-list"></ul>
            </nav>

            <!-- Storage Progress Component -->
            <div class="sidebar-storage">
                <div class="storage-bar-track">
                    <div class="storage-bar-fill" id="storage-bar-fill"></div>
                </div>
                <span class="storage-label" id="storage-label">Storage: –</span>
            </div>

            <!-- Footer -->
            <div class="sidebar-footer">
                <a href="index.html">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Classic View
                </a>
                <a href="admin.html">Admin</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1 id="category-title">All Styles</h1>
                <p class="subtitle" id="category-subtitle">Explore curated Midjourney seeds and copy them instantly.</p>
            </header>

            <!-- Skeleton Loading -->
            <div class="skeleton-feed" id="skeleton-feed">
                <div class="skeleton-card">
                    <div class="skeleton-line skeleton-line--wide"></div>
                    <div class="skeleton-line skeleton-line--medium"></div>
                    <div class="skeleton-badges">
                        <div class="skeleton-badge"></div>
                        <div class="skeleton-badge"></div>
                        <div class="skeleton-badge"></div>
                    </div>
                    <div class="skeleton-img"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-line skeleton-line--full"></div>
                    <div class="skeleton-line skeleton-line--wide"></div>
                    <div class="skeleton-badges">
                        <div class="skeleton-badge"></div>
                        <div class="skeleton-badge"></div>
                    </div>
                    <div class="skeleton-img"></div>
                </div>
            </div>

            <!-- Seed Feed -->
            <div class="seed-feed" id="seed-feed" style="display:none"></div>
        </main>

    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="gl-lightbox" aria-hidden="true">
        <button class="gl-lightbox-close" id="gl-lb-close">✕</button>
        <button class="gl-lightbox-nav gl-lightbox-prev" id="gl-lb-prev">&#8249;</button>
        <button class="gl-lightbox-nav gl-lightbox-next" id="gl-lb-next">&#8250;</button>
        <div class="gl-lightbox-img-wrap">
            <img id="gl-lb-img" src="" alt="">
        </div>
    </div>

    <!-- Toast -->
    <div id="gl-toast" class="gl-toast">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span id="gl-toast-msg">Seed copied!</span>
    </div>

    <script src="gallery.js"></script>
</body>
</html>
