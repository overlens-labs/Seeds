<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <div class="login-logo">
                <h1>Seed Library</h1>
                <p>Acesso restrito</p>
            </div>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="login-user">Usuário</label>
                    <input type="text" id="login-user" placeholder="admin" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="login-pass">Senha</label>
                    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <p class="login-error" id="login-error"></p>
                <button type="submit" class="btn-primary login-submit">Entrar</button>
            </form>
        </div>
    </div>

    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h1>Seed Library</h1>
                <p>Descubra e copie prompts incríveis.</p>
            </div>
            <nav class="sidebar-nav">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="ilustracao">Ilustração</button>
                <button class="filter-btn" data-filter="pintura">Pintura</button>
                <button class="filter-btn" data-filter="cinematografico">Cinematográfico</button>
                <button class="filter-btn" data-filter="fotografia">Fotografia</button>
            </nav>
            <div id="sidebar-tags" class="sidebar-tags"></div>
            <button class="add-btn" id="open-add-modal">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Adicionar Seed
            </button>
            <div class="sidebar-footer">
                <button class="logout-btn" id="logout-btn">Sair</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="gallery-container" id="gallery"></main>

    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" aria-hidden="true">
        <button class="lightbox-close" id="lightbox-close" aria-label="Fechar">✕</button>
        <div class="lightbox-inner">
            <img class="lightbox-img" id="lightbox-img" src="" alt="">
            <div class="lightbox-info">
                <h2 class="lightbox-title" id="lightbox-title"></h2>
                <span class="lightbox-category" id="lightbox-category"></span>
                <p class="lightbox-prompt" id="lightbox-prompt"></p>
                <button class="lightbox-copy-btn" id="lightbox-copy-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    Copy Seed
                </button>
            </div>
        </div>
    </div>

    <!-- Modal: Adicionar Seed -->
    <div id="add-modal" class="modal" aria-hidden="true">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Adicionar Seed</h2>
                <button class="modal-close" id="close-add-modal">✕</button>
            </div>
            <form id="add-seed-form" class="modal-form">
                <div class="form-group">
                    <label for="form-title">Título</label>
                    <input type="text" id="form-title" placeholder="Ex: Retrato Cinemático" required>
                </div>
                <div class="form-group">
                    <label for="form-category">Categoria</label>
                    <select id="form-category" required>
                        <option value="" disabled selected>Selecione...</option>
                        <option value="ilustracao">Ilustração</option>
                        <option value="pintura">Pintura</option>
                        <option value="cinematografico">Cinematográfico</option>
                        <option value="fotografia">Fotografia</option>
                    </select>
                </div>
                <div class="form-group" id="form-tag-group" style="display:none">
                    <label for="form-tag">Tag (opcional)</label>
                    <select id="form-tag">
                        <option value="">Sem tag</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="form-image">Imagem</label>
                    <input type="file" id="form-image" accept="image/*" required>
                    <div class="img-preview" id="img-preview"></div>
                </div>
                <div class="form-group">
                    <label for="form-seed">Prompt / Seed</label>
                    <textarea id="form-seed" rows="3" placeholder="--v 6.1 --ar 2:3 --stylize 500 --seed 12345678" required></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancel-add-modal">Cancelar</button>
                    <button type="submit" class="btn-primary">Adicionar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-message">Seed copied!</span>
    </div>

    <script src="main.js"></script>
</body>
</html>
