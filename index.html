<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Library</title>
    <meta name="description" content="Descubra e copie prompts incríveis para geração de imagens com IA.">
    <meta property="og:title" content="Seed Library">
    <meta property="og:description" content="Descubra e copie prompts incríveis para geração de imagens com IA.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.svg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Seed Library">
    <meta name="twitter:description" content="Descubra e copie prompts incríveis para geração de imagens com IA.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="logo-dark.svg" alt="Overlens" class="sidebar-logo-img" id="logo-title">
                <p id="logo-subtitle">Descubra e copie prompts incríveis.</p>
            </div>
            <div class="sidebar-search">
                <input type="text" id="gallery-search" placeholder="Buscar prompt..." autocomplete="off">
            </div>
            <nav id="sidebar-nav" class="sidebar-nav"></nav>
            <div id="sidebar-tags" class="sidebar-tags"></div>
            <!-- Admin access: /admin.html (login required) -->
        </aside>

        <!-- Sidebar toggle -->
        <button class="sidebar-toggle" id="sidebar-toggle" title="Recolher/expandir sidebar">‹</button>

        <!-- Main Content -->
        <main class="gallery-container" id="gallery"></main>


    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" aria-hidden="true">
        <button class="lightbox-close" id="lightbox-close" aria-label="Fechar">✕</button>
        <button class="lightbox-nav lightbox-nav--prev" id="lightbox-prev">&#8249;</button>
        <button class="lightbox-nav lightbox-nav--next" id="lightbox-next">&#8250;</button>
        <div class="lightbox-inner">
            <div class="lightbox-img-wrap">
                <img class="lightbox-img" id="lightbox-img" src="" alt="">
            </div>
            <div class="lightbox-info">
                <div class="lightbox-meta">
                    <span class="lightbox-category" id="lightbox-category"></span>
                </div>
                <div class="lightbox-params" id="lightbox-params"></div>
                <p class="lightbox-prompt" id="lightbox-prompt"></p>
                <div class="lightbox-actions">
                    <button class="lightbox-copy-btn" id="lightbox-copy-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copy Seed
                    </button>
                    <button class="lightbox-download-btn" id="lightbox-download-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Download
                    </button>
                    <button class="lightbox-fav-btn" id="lightbox-fav-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                        <span class="fav-btn-text">Favoritar</span>
                    </button>
                    <button class="lightbox-share-btn" id="lightbox-share-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="18" cy="5" r="3"></circle>
                            <circle cx="6" cy="12" r="3"></circle>
                            <circle cx="18" cy="19" r="3"></circle>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                        </svg>
                        Compartilhar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-message">Seed copied!</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="main.js"></script>
</body>
</html>
